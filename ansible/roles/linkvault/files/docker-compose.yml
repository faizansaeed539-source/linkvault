services:
  db:
    image: postgres:15
    container_name: linkvault-db
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkvault_user -d linkvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: fasaeed539/linkvault:latest
    container_name: linkvault-app
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
